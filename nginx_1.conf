# nginx.conf - 反向代理配置
# 将 HTTP API 和 MCP 端点统一通过 nginx 暴露

upstream dotnet_backend {
    server 127.0.0.1:10010;
}

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    # ============================================================
    # HTTP API 路由（前端、其他服务调用）
    # ============================================================
    location /api/ {
        proxy_pass http://dotnet_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # MCP 端点路由（AI Agent / MCP Client 调用）
    # 需要支持 SSE 长连接，所以关闭缓冲
    # ============================================================
    location /mcp {
        proxy_pass http://dotnet_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键配置：关闭缓冲，支持长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;   # 24小时，避免 SSE 连接被提前断开
        proxy_send_timeout 86400s;

        # 支持 chunked transfer
        chunked_transfer_encoding on;
    }

    # 旧版 SSE 兼容端点（MapMcp 自动注册的）
    location /mcp/sse {
        proxy_pass http://dotnet_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # Swagger UI（开发环境可开放，生产环境建议关闭）
    location /swagger {
        proxy_pass http://dotnet_backend;
        proxy_set_header Host $host;
    }
}
